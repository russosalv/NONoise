name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Verify NPM_TOKEN is set
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN secret is not set on this repository."
            echo "Go to Settings → Secrets and variables → Actions → New repository secret."
            exit 1
          fi
          echo "NPM_TOKEN is present."

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run typecheck
      - run: pnpm -r run build
      - run: pnpm -r run test

      - name: Pack (dry audit of tarball)
        run: |
          cd packages/create-nonoise
          pnpm pack --pack-destination /tmp
          TARBALL=$(ls /tmp/create-nonoise-*.tgz | head -n 1)
          echo "Tarball: $TARBALL"
          echo "Size: $(du -h "$TARBALL" | cut -f1)"
          echo "--- contents (top 40) ---"
          tar -tzf "$TARBALL" | head -40
          echo "--- total entries ---"
          tar -tzf "$TARBALL" | wc -l

      - name: Publish to npm with provenance
        # Use `npm publish` (not `pnpm publish`) because pnpm's publish path
        # does not populate the README metadata on the registry, which leaves
        # the npm package page blank. npm publish picks up README.md at the
        # package root correctly.
        run: |
          cd packages/create-nonoise
          npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
