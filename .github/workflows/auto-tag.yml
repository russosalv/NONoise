name: Auto-tag on version bump

on:
  push:
    branches: [main]

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      created: ${{ steps.tag.outputs.created }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag if version changed
        id: tag
        run: |
          VERSION=$(node -p "require('./packages/create-nonoise/package.json').version")
          TAG="v$VERSION"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git rev-parse "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to do."
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" -m "release: create-nonoise $VERSION"
          git push origin "$TAG"
          echo "Created and pushed $TAG."
          echo "created=true" >> "$GITHUB_OUTPUT"

  publish:
    needs: tag
    if: needs.tag.outputs.created == 'true'
    permissions:
      id-token: write
      contents: read
    uses: ./.github/workflows/release.yml
    secrets: inherit
